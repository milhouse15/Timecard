<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timecard Pro+</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  padding:15px 0;
}
.app-frame{
  max-width:480px;
  width:95%;
  background:#fdfaf0;
  border-radius:16px;
  border: 2px solid #fff;
  box-shadow:0 6px 18px rgba(0,0,0,.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  color:#111;
  box-sizing:border-box;
}
.top-bar{
  background:#000;
  color:#fff;
  padding:16px 15px;
  font-weight:700;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:10px 15px;
  overflow-x:auto;
}
.slide-wrapper { transition: transform 0.3s ease-in-out; }
table{
  width:100%;
  border-collapse:collapse;
  background:#fdfaf0;
  border-radius:12px;
  table-layout:fixed;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  color:#111;
}
th{ background:#f5f0e6; font-weight:600; }
input{
  border:none;
  width:80%;
  text-align:center;
  font-size:16px;
  background:#fff9eb;
  border-radius:6px;
  padding:4px 2px;
  color:#111;
}
input:focus{ background:#fff7d9; outline:none; }
.total{ font-weight:600; background:#f5f0e6; }
.weekTotal{ font-weight:700; font-size:20px; }
.bar{ height:6px; background:#007aff; border-radius:4px; margin-top:3px; width:100%; }
.bottom-buttons{ padding:12px 15px; }
button.clock{
  background:#34c759;
  color:white;
  font-size:16px;
  border-radius:10px;
  width:100%;
  padding:12px;
  border:none;
}
button.addEntry{
  background:#007aff;
  color:white;
  border:none;
  border-radius:6px;
  padding:2px 6px;
  font-size:14px;
}
.weekTotalRow td{
  font-weight:700;
  background:#e2dac6;
  border-top:2px solid #ccc;
  padding:6px 8px;
}
</style>
</head>
<body>

<div class="app-frame">

  <div class="top-bar">
    <div id="weekLabel">Timecard: Week of --/--/----</div>
    <button onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="container">
    <div class="slide-wrapper">
      <table id="table">
        <thead>
          <tr>
            <th></th>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
        <tfoot>
          <tr>
            <td></td>
            <td><button class="addEntry" onclick="addEntry(0)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(1)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(2)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(3)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(4)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(5)">+</button></td>
          </tr>
          <tr>
            <td>Total</td>
            <td class="total" id="t0"></td>
            <td class="total" id="t1"></td>
            <td class="total" id="t2"></td>
            <td class="total" id="t3"></td>
            <td class="total" id="t4"></td>
            <td class="total" id="t5"></td>
          </tr>
          <tr class="weekTotalRow">
            <td colspan="5" style="text-align:left; padding-left:8px;">Week Total</td>
            <td colspan="2" style="text-align:right; padding-right:8px;" class="weekTotal" id="weekTotal"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <div class="bottom-buttons">
    <button class="clock" onclick="clockAuto()">Clock In / Out</button>
  </div>

</div>

<script>
const days=6; let weekOffset=0, initialRows=6;

function buildTable(){
  const body=document.getElementById("body"); body.innerHTML="";
  for(let r=0;r<initialRows;r++){
    let tr=document.createElement("tr");
    let label=document.createElement("td"); label.innerText=r%2==0?"In":"Out"; tr.appendChild(label);
    for(let d=0;d<days;d++){
      let td=document.createElement("td"); let input=document.createElement("input");
      input.dataset.r=r; input.dataset.d=d;
      input.addEventListener("change",()=>{save();calc();});
      td.appendChild(input); tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}
buildTable();

function addEntry(day){
  const tbody=document.getElementById("body");
  const inRow=document.createElement("tr"); const outRow=document.createElement("tr");
  const inLabel=document.createElement("td"); inLabel.innerText="In"; inRow.appendChild(inLabel);
  const outLabel=document.createElement("td"); outLabel.innerText="Out"; outRow.appendChild(outLabel);
  for(let d=0;d<days;d++){
    let inCell=document.createElement("td"); let outCell=document.createElement("td");
    if(d===day){
      let inInput=document.createElement("input"); inInput.dataset.r="dynamic"; inInput.dataset.d=d; inInput.addEventListener("change",()=>{save();calc();});
      let outInput=document.createElement("input"); outInput.dataset.r="dynamic"; outInput.dataset.d=d; outInput.addEventListener("change",()=>{save();calc();});
      inCell.appendChild(inInput); outCell.appendChild(outInput);
    }
    inRow.appendChild(inCell); outRow.appendChild(outCell);
  }
  tbody.appendChild(inRow); tbody.appendChild(outRow);
}

function parseTime(v){
  if(!v) return null;
  v=v.toLowerCase().replace(/\s/g,'');
  if(/^\d{3,4}$/.test(v)){ let h=v.slice(0,-2), m=v.slice(-2); return roundMinutes(parseInt(h)*60+parseInt(m)); }
  let m=v.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m) return null;
  let h=parseInt(m[1]), min=parseInt(m[2]||0);
  if(m[3]=="pm"&&h!=12) h+=12; if(m[3]=="am"&&h==12) h=0;
  return roundMinutes(h*60+min);
}
function roundMinutes(minutes){ return Math.round(minutes/15)*15; }

function calc(){
  let week=0;
  for(let d=0;d<days;d++){
    let total=0;
    const inputs=document.querySelectorAll(`input[data-d="${d}"]`);
    for(let i=0;i<inputs.length;i+=2){
      const t1=parseTime(inputs[i]?.value);
      const t2=parseTime(inputs[i+1]?.value);
      if(t1!=null && t2!=null) total+=t2-t1;
    }
    let hrs = total/60; week+=hrs;
    document.getElementById("t"+d).innerHTML=hrs.toFixed(2)+"<div class='bar' style='width:"+Math.min(hrs/12*100,100)+"%'></div>";
  }
  document.getElementById("weekTotal").innerText=week.toFixed(2);
  document.getElementById("weekTotal").style.color=week>40?"red":"black";
}

function clockAuto(){
  let day=(new Date().getDay()+6)%7; if(day>5) return;
  const inputs=document.querySelectorAll(`input[data-d="${day}"]`);
  let placed=false;
  for(let i=0;i<inputs.length;i++){
    if(!inputs[i].value){
      if(i===inputs.length-1){ addEntry(day); }
      const now=new Date(); let minutes=Math.round((now.getHours()*60+now.getMinutes())/15)*15;
      let h=Math.floor(minutes/60), m=minutes%60; const ampm=h>=12?"pm":"am";
      h=h%12; if(h===0) h=12; inputs[i].value=h+":"+(m<10?"0":"")+m+ampm;
      placed=true; break;
    }
  }
  if(!placed){
    const newInputs=document.querySelectorAll(`input[data-d="${day}"]`);
    for(let i=0;i<newInputs.length;i++){
      if(!newInputs[i].value){
        const now=new Date(); let minutes=Math.round((now.getHours()*60+now.getMinutes())/15)*15;
        let h=Math.floor(minutes/60), m=minutes%60; const ampm=h>=12?"pm":"am";
        h=h%12; if(h===0) h=12; newInputs[i].value=h+":"+(m<10?"0":"")+m+ampm;
        break;
      }
    }
  }
  save(); calc();
}

function weekKey(){ let d=new Date(); d.setDate(d.getDate()-(d.getDay()+6)%7); d.setDate(d.getDate()+weekOffset*7); return "week_"+d.toISOString().slice(0,10); }
function save(){ let data=[]; document.querySelectorAll("input").forEach(i=>data.push(i.value)); localStorage.setItem(weekKey(), JSON.stringify(data)); }
function load(){ const data=JSON.parse(localStorage.getItem(weekKey())||"[]"); document.querySelectorAll("input").forEach((i,x)=>i.value=data[x]||""); updateWeekLabel(); calc(); }

function slideWeek(offset){ const wrapper=document.querySelector('.slide-wrapper'); wrapper.style.transform=`translateX(${offset}px)`; setTimeout(()=>{ wrapper.style.transition='none'; wrapper.style.transform='translateX(0)'; load(); wrapper.style.transition='transform 0.3s ease-in-out'; },300); }
function nextWeek(){ slideWeek(-480); weekOffset++; } 
function prevWeek(){ slideWeek(480); weekOffset--; }
function updateWeekLabel(){ let d=new Date(); d.setDate(d.getDate()-(d.getDay()+6)%7); d.setDate(d.getDate()+weekOffset*7); document.getElementById("weekLabel").innerText=`Timecard: Week of ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }

function exportCSV(){
  const table = document.getElementById("table");
  const rows = [];
  table.querySelectorAll("tbody tr").forEach(tr=>{
    const row=[];
    tr.querySelectorAll("td").forEach(td=>{
      const input = td.querySelector("input");
      row.push(input ? input.value : td.innerText);
    });
    rows.push(row.join(","));
  });
  const totalRow = ["Total"];
  for(let d=0; d<6; d++){
    const t = document.getElementById("t"+d).innerText.replace(/\n.*/,"");
    totalRow.push(t);
  }
  rows.push(totalRow.join(","));
  let d = new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7);
  const filename = `timecard_${d.toISOString().slice(0,10)}.csv`;
  const blob = new Blob([rows.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

let startX=null;
document.addEventListener("touchstart", e=>startX=e.touches[0].clientX);
document.addEventListener("touchend", e=>{ let dx=e.changedTouches[0].clientX-startX; if(dx>80) prevWeek(); if(dx<-80) nextWeek(); });

load();
</script>

</body>
</html>
