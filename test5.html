<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timecard Pro+</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  margin:0;
  background:#111;
  color:#eee;
  display:flex;
  justify-content:center;
  padding:15px 0;
}
.app-frame{
  max-width:480px;
  width:95%;
  background:#fdfaf0;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.top-bar{
  background:#000;
  color:#fff;
  padding:12px 15px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:10px 15px;
  overflow-x:auto;
}
.slide-wrapper {
  transition: transform 0.3s ease-in-out;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fdfaf0;
  border-radius:12px;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}
th{
  background:#f5f0e6;
  font-weight:600;
}
input{
  border:none;
  width:80%;
  text-align:center;
  font-size:16px;
  background:#fff9eb;
  border-radius:6px;
  padding:4px 2px;
}
input:focus{
  background:#fff7d9;
  outline:none;
}
.total{ font-weight:600; background:#f5f0e6; }
.weekTotal{ font-weight:700; font-size:20px; }
.bar{ height:6px; background:#007aff; border-radius:4px; margin-top:3px; width:100%; }
.bottom-buttons{
  padding:12px 15px;
}
button.clock{
  background:#34c759;
  color:white;
  font-size:16px;
  border-radius:10px;
  width:100%;
  padding:12px;
  border:none;
}
button.addEntry{
  background:#007aff; color:white; border:none; border-radius:6px; padding:2px 6px; font-size:14px;
}
/* Responsive scaling on small iPhones */
@media screen and (max-width:480px){
  table,thead,tbody,tr,th,td{ display:table; }
  input{ font-size:14px; width:70%; }
  .bar{ height:6px; margin-top:2px; }
  button.addEntry{ font-size:12px; padding:2px 4px; }
}
</style>
</head>
<body>

<div class="app-frame">

  <!-- Top Bar -->
  <div class="top-bar">
    <div id="weekLabel">Timecard: Week of --/--/----</div>
    <button onclick="exportCSV()">Export CSV</button>
  </div>

  <!-- Table Container -->
  <div class="container">
    <div class="slide-wrapper">
      <table id="table">
        <thead>
          <tr>
            <th></th>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
          </tr>
        </thead>
        <tbody id="body">
          <!-- initial rows generated by JS -->
        </tbody>
        <tfoot>
          <tr>
            <td></td>
            <td><button class="addEntry" onclick="addEntry(0)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(1)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(2)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(3)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(4)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(5)">+</button></td>
          </tr>
          <tr>
            <td>Total</td>
            <td class="total" id="t0"></td>
            <td class="total" id="t1"></td>
            <td class="total" id="t2"></td>
            <td class="total" id="t3"></td>
            <td class="total" id="t4"></td>
            <td class="total" id="t5"></td>
          </tr>
          <tr>
            <td colspan="6">Week Total</td>
            <td class="weekTotal" id="weekTotal"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Bottom Clock Button -->
  <div class="bottom-buttons">
    <button class="clock" onclick="clockAuto()">Clock In / Out</button>
  </div>

</div>

<script>
const days=6;
let weekOffset=0, initialRows=6;

// Build initial In/Out table
function buildTable(){
  const body=document.getElementById("body"); body.innerHTML="";
  for(let r=0;r<initialRows;r++){
    let tr=document.createElement("tr");
    let label=document.createElement("td"); label.innerText=r%2==0?"In":"Out"; tr.appendChild(label);
    for(let d=0; d<days; d++){
      let td=document.createElement("td");
      let input=document.createElement("input");
      input.dataset.r=r; input.dataset.d=d;
      input.addEventListener("change", ()=>{save();calc();});
      td.appendChild(input);
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}
buildTable();

// Add new In/Out entry for a specific day
function addEntry(day){
  const tbody=document.getElementById("body");
  const inRow=document.createElement("tr");
  const outRow=document.createElement("tr");

  const inLabel=document.createElement("td"); inLabel.innerText="In"; inRow.appendChild(inLabel);
  const outLabel=document.createElement("td"); outLabel.innerText="Out"; outRow.appendChild(outLabel);

  for(let d=0; d<days; d++){
    let inCell=document.createElement("td");
    let outCell=document.createElement("td");
    if(d===day){
      let inInput=document.createElement("input");
      inInput.dataset.r="dynamic"; inInput.dataset.d=d; inInput.addEventListener("change",()=>{save();calc();});
      inCell.appendChild(inInput);

      let outInput=document.createElement("input");
      outInput.dataset.r="dynamic"; outInput.dataset.d=d; outInput.addEventListener("change",()=>{save();calc();});
      outCell.appendChild(outInput);
    }
    inRow.appendChild(inCell);
    outRow.appendChild(outCell);
  }
  tbody.appendChild(inRow);
  tbody.appendChild(outRow);
}

// Parse time and round
function parseTime(v){
  if(!v) return null;
  v=v.toLowerCase().replace(/\s/g,'');
  if(/^\d{3,4}$/.test(v)){
    let h=v.slice(0,-2), m=v.slice(-2);
    return roundMinutes(parseInt(h)*60+parseInt(m));
  }
  let m=v.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/);
  if(!m) return null;
  let h=parseInt(m[1]), min=parseInt(m[2]||0);
  if(m[3]=="pm"&&h!=12) h+=12;
  if(m[3]=="am"&&h==12) h=0;
  return roundMinutes(h*60+min);
}
function roundMinutes(minutes){ return Math.round(minutes/15)*15; }

// Calculate totals
function calc(){
  let week=0;
  for(let d=0; d<days; d++){
    let total=0;
    document.querySelectorAll(`input[data-d="${d}"]`).forEach((inp, i)=>{
      if(i%2===0){
        const t1=parseTime(inp.value);
        const t2=parseTime(document.querySelectorAll(`input[data-d="${d}"]`)[i+1]?.value);
        if(t1!=null && t2!=null) total+=t2-t1;
      }
    });
    let hrs=total/60; week+=hrs;
    document.getElementById("t"+d).innerHTML=hrs.toFixed(2)+"<div class='bar' style='width:"+Math.min(hrs/12*100,100)+"%'></div>";
  }
  document.getElementById("weekTotal").innerText=week.toFixed(2);
  document.getElementById("weekTotal").style.color=week>40?"red":"black";
}

// Clock In/Out auto
function clockAuto(){
  let day=(new Date().getDay()+6)%7; if(day>5) return;
  const inputs=document.querySelectorAll(`input[data-d="${day}"]`);
  for(let i=0;i<inputs.length;i++){
    if(!inputs[i].value){
      const now=new Date();
      let minutes=roundMinutes(now.getHours()*60+now.getMinutes());
      let h=Math.floor(minutes/60), m=minutes%60;
      const ampm=h>=12?"pm":"am"; h=h%12; if(h===0) h=12;
      inputs[i].value=h+":"+(m<10?"0":"")+m+ampm;
      break;
    }
  }
  save(); calc();
}

// Week key
function weekKey(){ let d=new Date(); d.setDate(d.getDate()-(d.getDay()+6)%7); d.setDate(d.getDate()+weekOffset*7); return "week_"+d.toISOString().slice(0,10); }

// Save/load
function save(){
  let data=[]; document.querySelectorAll("input").forEach(i=>data.push(i.value));
  localStorage.setItem(weekKey(), JSON.stringify(data));
}
function load(){
  const data=JSON.parse(localStorage.getItem(weekKey())||"[]");
  document.querySelectorAll("input").forEach((i,x)=>i.value=data[x]||"");
  updateWeekLabel(); calc();
}

// Slide weeks
function slideWeek(offset){
  const wrapper=document.querySelector('.slide-wrapper');
  wrapper.style.transform=`translateX(${offset}px)`;
  setTimeout(()=>{ wrapper.style.transition='none'; wrapper.style.transform='translateX(0)'; load(); wrapper.style.transition='transform 0.3s ease-in-out'; },300);
}
function nextWeek(){ slideWeek(-480); weekOffset++; }
function prevWeek(){ slideWeek(480); weekOffset--; }
function updateWeekLabel(){
  let d=new Date(); d.setDate(d.getDate()-(d.getDay()+6)%7); d.setDate(d.getDate()+weekOffset*7);
  document.getElementById("weekLabel").innerText=`Timecard: Week of ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// Export CSV
function exportCSV(){
  let rowsArr=[];
  document.querySelectorAll("table tr").forEach(tr=>{
    let row=[]; tr.querySelectorAll("td,th").forEach(c=>row.push(c.innerText)); rowsArr.push(row.join(","));
  });
  const blob=new Blob([rowsArr.join("\n")]); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="timecard.csv"; a.click();
}

// Swipe gestures
let startX=null;
document.addEventListener("touchstart", e=>startX=e.touches[0].clientX);
document.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(dx>80) prevWeek(); if(dx<-80) nextWeek();
});

// FaceID / TouchID lock
async function faceLock(){ if(!window.PublicKeyCredential) return; try{await navigator.credentials.get({publicKey:{challenge:new Uint8Array(16),timeout:60000,userVerification:"required"}});}catch(e){} }
faceLock();

// Initialize
load();
</script>

</body>
</html>
