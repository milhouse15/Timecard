<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timecard Pro+</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  padding:15px 0;
}
.app-frame{
  max-width:480px;
  width:95%;
  background:#fdfaf0;
  border-radius:16px;
  border: 2px solid #fff;
  box-shadow:0 6px 18px rgba(0,0,0,.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  color:#111;
  box-sizing:border-box;
}
.top-bar{
  background:#000;
  color:#fff;
  padding:16px 15px;
  font-weight:700;
  font-size:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:10px 15px;
  overflow-x:auto;
}
.slide-wrapper { transition: transform 0.3s ease-in-out; }
table{
  width:100%;
  border-collapse:collapse;
  background:#fdfaf0;
  border-radius:12px;
  table-layout:fixed;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  color:#111;
}
th{ background:#f5f0e6; font-weight:600; }
input{
  border:none;
  width:80%;
  text-align:center;
  font-size:16px;
  background:#fff9eb;
  border-radius:6px;
  padding:4px 2px;
  color:#111;
}
input:focus{ background:#fff7d9; outline:none; }
.total{ font-weight:600; background:#f5f0e6; }
.weekTotal{ font-weight:700; font-size:20px; }
.bar{ height:6px; background:#007aff; border-radius:4px; margin-top:3px; width:100%; }
.bottom-buttons{ padding:12px 15px; }
button.clock{
  background:#34c759;
  color:white;
  font-size:16px;
  border-radius:10px;
  width:100%;
  padding:12px;
  border:none;
}
button.addEntry{
  background:#007aff;
  color:white;
  border:none;
  border-radius:6px;
  padding:2px 6px;
  font-size:14px;
}
.weekTotalRow td{
  font-weight:700;
  background:#e2dac6;
  border-top:2px solid #ccc;
  padding:6px 8px;
}
</style>
</head>
<body>

<div class="app-frame">

  <div class="top-bar">
    <div id="weekLabel">Timecard: Week of --/--/----</div>
    <button onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="container">
    <div class="slide-wrapper">
      <table id="table">
        <thead>
          <tr>
            <th></th>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
        <tfoot>
          <tr>
            <td></td>
            <td><button class="addEntry" onclick="addEntry(0)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(1)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(2)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(3)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(4)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(5)">+</button></td>
          </tr>
          <tr>
            <td>Total</td>
            <td class="total" id="t0"></td>
            <td class="total" id="t1"></td>
            <td class="total" id="t2"></td>
            <td class="total" id="t3"></td>
            <td class="total" id="t4"></td>
            <td class="total" id="t5"></td>
          </tr>
          <tr class="weekTotalRow">
            <td colspan="5" style="text-align:left; padding-left:8px;">Week Total</td>
            <td colspan="2" style="text-align:right; padding-right:8px;" class="weekTotal" id="weekTotal"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <div class="bottom-buttons">
    <button class="clock" onclick="clockAuto()">Clock In / Out</button>
  </div>

</div>

<script>
const days=6;
let weekOffset=0, initialRows=6;

// Track how many extra entry pairs have been added per day
// dynamicCounts[weekKey][day] = number of extra in/out pairs
let dynamicCounts = {};

function getDynamicCounts() {
  const key = weekKey();
  if (!dynamicCounts[key]) dynamicCounts[key] = Array(days).fill(0);
  return dynamicCounts[key];
}

// Build initial table rows (no dynamic rows yet)
function buildTable(){
  const body=document.getElementById("body");
  body.innerHTML="";
  for(let r=0;r<initialRows;r++){
    let tr=document.createElement("tr");
    tr.dataset.static = "true";
    let label=document.createElement("td"); label.innerText=r%2==0?"In":"Out"; tr.appendChild(label);
    for(let d=0;d<days;d++){
      let td=document.createElement("td");
      let input=document.createElement("input");
      input.type="tel"; input.inputMode="numeric"; input.pattern="[0-9]*";
      input.dataset.r=r; input.dataset.d=d;
      input.addEventListener("change",()=>{save();calc();});
      input.addEventListener("blur",()=>{autoFormat(input);});
      td.appendChild(input); tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

// Create a dynamic in/out row pair for a given day, optionally suppressing save
function createDynamicPair(day, suppressSave) {
  const tbody=document.getElementById("body");
  const inRow=document.createElement("tr");
  const outRow=document.createElement("tr");
  inRow.dataset.dynamic = day;
  outRow.dataset.dynamic = day;

  const inLabel=document.createElement("td"); inLabel.innerText="In"; inRow.appendChild(inLabel);
  const outLabel=document.createElement("td"); outLabel.innerText="Out"; outRow.appendChild(outLabel);

  for(let d=0;d<days;d++){
    let inCell=document.createElement("td");
    let outCell=document.createElement("td");
    if(d===day){
      let inInput=document.createElement("input");
      inInput.type="tel"; inInput.inputMode="numeric"; inInput.pattern="[0-9]*";
      inInput.dataset.r="dynamic"; inInput.dataset.d=d;
      inInput.addEventListener("change",()=>{save();calc();});
      inInput.addEventListener("blur",()=>{autoFormat(inInput);});

      let outInput=document.createElement("input");
      outInput.type="tel"; outInput.inputMode="numeric"; outInput.pattern="[0-9]*";
      outInput.dataset.r="dynamic"; outInput.dataset.d=d;
      outInput.addEventListener("change",()=>{save();calc();});
      outInput.addEventListener("blur",()=>{autoFormat(outInput);});

      inCell.appendChild(inInput);
      outCell.appendChild(outInput);
    }
    inRow.appendChild(inCell);
    outRow.appendChild(outCell);
  }
  tbody.appendChild(inRow);
  tbody.appendChild(outRow);

  if (!suppressSave) {
    // Increment count and save
    const counts = getDynamicCounts();
    counts[day]++;
    saveStructure();
    save();
  }
}

// Public-facing addEntry (called by + button)
function addEntry(day) {
  createDynamicPair(day, false);
}

// Auto-format input with AM/PM
function autoFormat(input){
  let prev=null;
  const colInputs = Array.from(document.querySelectorAll(`input[data-d="${input.dataset.d}"]`));
  for(let i=0;i<colInputs.length;i++){
    if(colInputs[i]===input) break;
    let t=parseTimeWithContext(colInputs[i].value, prev);
    if(t!=null) prev=t;
  }
  let t=parseTimeWithContext(input.value, prev);
  if(t!=null) input.value=formatTime(t);
  calc();
}

// Parse time with context
function parseTimeWithContext(v, prev=null){
  if(!v) return null;
  v=v.toLowerCase().replace(/\s/g,'');
  let h,m;
  if(/^\d{3,4}$/.test(v)){ h=v.slice(0,-2); m=v.slice(-2); }
  else{ let m1=v.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m1) return null; h=parseInt(m1[1]); m=parseInt(m1[2]||0); if(m1[3]=="pm"&&h!=12) h+=12; if(m1[3]=="am"&&h==12) h=0; }
  h=parseInt(h); m=parseInt(m);
  let minutes=h*60+m;
  if(prev!=null && minutes<=prev) minutes+=12*60;
  return roundMinutes(minutes);
}

// Format minutes as h:mm AM/PM
function formatTime(minutes){
  minutes = minutes % (24*60);
  let h=Math.floor(minutes/60), m=minutes%60;
  let ampm = h>=12?"PM":"AM";
  h=h%12; if(h===0) h=12;
  return `${h}:${m<10?"0":""}${m} ${ampm}`;
}

function roundMinutes(minutes){ return Math.round(minutes/15)*15; }

function calc(){
  let week=0;
  for(let d=0;d<days;d++){
    let total=0; let prev=null;
    const inputs=document.querySelectorAll(`input[data-d="${d}"]`);
    for(let i=0;i<inputs.length;i+=2){
      const t1=parseTimeWithContext(inputs[i]?.value, prev); if(t1!=null) prev=t1;
      const t2=parseTimeWithContext(inputs[i+1]?.value, t1); if(t2!=null) prev=t2;
      if(t1!=null && t2!=null) total+=t2-t1;
    }
    let hrs = total/60; week+=hrs;
    document.getElementById("t"+d).innerHTML=hrs.toFixed(2)+"<div class='bar' style='width:"+Math.min(hrs/12*100,100)+"%'></div>";
  }
  document.getElementById("weekTotal").innerText=week.toFixed(2);
  document.getElementById("weekTotal").style.color=week>40?"red":"black";
}

// Clock in/out
function clockAuto(){
  let day=(new Date().getDay()+6)%7; if(day>5) return;
  const inputs=document.querySelectorAll(`input[data-d="${day}"]`);
  for(let i=0;i<inputs.length;i++){
    if(!inputs[i].value){
      if(i===inputs.length-1){ addEntry(day); }
      const now=new Date(); let minutes=Math.round((now.getHours()*60+now.getMinutes())/15)*15;
      let h=Math.floor(minutes/60), m=minutes%60; const ampm=h>=12?"PM":"AM";
      h=h%12; if(h===0) h=12; inputs[i].value=`${h}:${m<10?"0":""}${m} ${ampm}`;
      break;
    }
  }
  save(); calc();
}

// Week key
function weekKey(){
  let d=new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7);
  d.setDate(d.getDate()+weekOffset*7);
  return "week_"+d.toISOString().slice(0,10);
}

// Save dynamic row structure (counts per day) to localStorage
function saveStructure() {
  const key = weekKey();
  localStorage.setItem(key+"_structure", JSON.stringify(getDynamicCounts()));
}

// Save all input values
function save(){
  const data = [];
  document.querySelectorAll("input").forEach(i => data.push(i.value));
  localStorage.setItem(weekKey(), JSON.stringify(data));
}

// Load: first restore structure (dynamic rows), then restore values
function load(){
  buildTable();

  // Restore dynamic row counts for this week
  const key = weekKey();
  const savedCounts = JSON.parse(localStorage.getItem(key+"_structure") || "null");
  if (savedCounts) {
    dynamicCounts[key] = savedCounts;
    // Recreate dynamic rows without triggering another save
    for (let d = 0; d < days; d++) {
      for (let i = 0; i < savedCounts[d]; i++) {
        createDynamicPair(d, true);
      }
    }
  } else {
    dynamicCounts[key] = Array(days).fill(0);
  }

  // Now restore all values
  const saved = JSON.parse(localStorage.getItem(key) || "[]");
  const inputs = document.querySelectorAll("input");
  inputs.forEach((input, idx) => {
    if (saved[idx] !== undefined) input.value = saved[idx];
  });

  updateWeekLabel();
  calc();
}

// Update week label
function updateWeekLabel(){
  let d = new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7 + weekOffset*7);
  document.getElementById("weekLabel").innerText=`Timecard: Week of ${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;
}

// CSV export
function exportCSV(){
  const table = document.getElementById("table");
  const rows = [];
  table.querySelectorAll("tbody tr").forEach(tr=>{
    const row=[];
    tr.querySelectorAll("td").forEach(td=>{
      const input = td.querySelector("input");
      row.push(input ? input.value : td.innerText);
    });
    rows.push(row.join(","));
  });
  const totalRow = ["Total"];
  for(let d=0; d<6; d++){
    const t = document.getElementById("t"+d).innerText.replace(/\n.*/,"");
    totalRow.push(t);
  }
  rows.push(totalRow.join(","));
  let d = new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7);
  const filename = `timecard_${d.toISOString().slice(0,10)}.csv`;
  const blob = new Blob([rows.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// Swipe detection
let startX=null;
document.addEventListener("touchstart", e=>startX=e.touches[0].clientX);
document.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(dx>80) { weekOffset--; load(); }
  if(dx<-80) { weekOffset++; load(); }
});

// Down arrow moves down column
document.addEventListener("keydown", function(e){
  if(e.key !== "ArrowDown") return;
  const active = document.activeElement;
  if(!active || active.tagName !== "INPUT") return;
  e.preventDefault();
  const col = active.dataset.d;
  const allColInputs = Array.from(document.querySelectorAll(`input[data-d="${col}"]`));
  const index = allColInputs.indexOf(active);
  if(index >= 0 && index < allColInputs.length-1){
    allColInputs[index+1].focus();
  }
});

load();
</script>

</body>
</html>
