<style>
:root{
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --surface: #242424;
  --surface2: #2e2e2e;
  --border: #444;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --text: #f0f0f0;
  --text-muted: #888;
  --text-dim: #666;
  --red: #ff4d4d;
  --mono: 'Outfit', sans-serif;
  --sans: 'Outfit', sans-serif;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  font-family:var(--sans);
  margin:0;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:16px 0 32px;
}
.app-frame{
  max-width:500px;
  width:96%;
  background:#1a1a1a;
  border-radius:20px;
  border:1px solid #444;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Header ── */
.top-bar{
background:#1a1a1a;
border-bottom:1px solid #444;
padding:18px 18px 14px;
display:flex;
justify-content:space-between;
align-items:flex-start;
}
.top-bar-left{ display:flex; flex-direction:column; gap:3px; }
.app-title{
font-family:var(–mono);
font-size:10px;
font-weight:500;
letter-spacing:0.15em;
text-transform:uppercase;
color:#00e5a0;
}
#weekLabel{
font-family:var(–sans);
font-size:18px;
font-weight:700;
color:#e8e8e8;
letter-spacing:-0.02em;
}
.nav-row{
display:flex;
gap:6px;
align-items:center;
margin-top:10px;
}
.nav-btn{
background:#242424;
border:1px solid #444;
color:#888;
border-radius:8px;
padding:5px 12px;
font-size:13px;
font-family:var(–sans);
font-weight:500;
cursor:pointer;
transition:all 0.15s;
}
.nav-btn:active{ background:#2e2e2e; color:#f0f0f0; }
.export-btn{
background:transparent;
border:1px solid #444;
color:#888;
border-radius:8px;
padding:6px 14px;
font-size:13px;
font-family:var(–sans);
font-weight:500;
cursor:pointer;
transition:all 0.15s;
white-space:nowrap;
}
.export-btn:active{ border-color:#00e5a0; color:#00e5a0; }

/* ── Table ── */
.container{
padding:12px 14px;
overflow-x:auto;
}
table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}
th{
font-family:var(–mono);
font-size:10px;
font-weight:500;
letter-spacing:0.1em;
text-transform:uppercase;
color:#d0d0d0;
padding:6px 2px;
border-bottom:1px solid #444;
text-align:center;
}
td{
border-bottom:1px solid #333;
padding:2px 1px;
text-align:center;
}
td:first-child{
font-family:var(–mono);
font-size:9px;
letter-spacing:0.08em;
text-transform:uppercase;
color:#666;
width:26px;
}
/* Alternating row tint */
tr:nth-child(4n+1) td, tr:nth-child(4n+2) td{
background:rgba(255,255,255,0.015);
}

/* ── Saturday toggle ── */
.sat-col{ transition: all 0.2s; }
.sat-hidden .sat-col{ display:none; }
.sat-btn{
background:#242424;
border:1px solid #444;
color:#888;
border-radius:8px;
padding:5px 10px;
font-size:13px;
font-family:var(–sans);
font-weight:500;
cursor:pointer;
transition:all 0.15s;
}
.sat-btn.active{ border-color:#00e5a0; color:#00e5a0; background:rgba(0,229,160,0.12); }

input{
border:none;
width:95%;
text-align:center;
font-size:16px;
font-family:var(–mono);
font-weight:400;
background:transparent;
border-radius:5px;
padding:4px 1px;
color:#f0f0f0;
transition:background 0.15s;
}
input:focus{
background:rgba(0,229,160,0.12);
outline:none;
color:#00e5a0;
}

/* ── Totals ── */
.total{
font-family:var(–mono);
font-size:11px;
font-weight:500;
color:#00e5a0;
background:#242424 !important;
border-top:1px solid #444 !important;
padding:4px 2px !important;
}
.bar{
height:2px;
background:#00e5a0;
border-radius:2px;
margin-top:3px;
opacity:0.5;
}
.weekTotalRow td{
background:#242424 !important;
border-top:1px solid #00e5a0 !important;
padding:10px 8px !important;
}
.week-total-label{
font-family:var(–mono);
font-size:9px;
letter-spacing:0.12em;
text-transform:uppercase;
color:#888;
text-align:left;
padding-left:8px !important;
}
.weekTotal{
font-family:var(–mono);
font-weight:500;
font-size:22px;
color:#00e5a0;
text-align:right;
padding-right:8px !important;
}
.weekTotal.over{ color:#ff4d4d; }

/* ── Add row ── */
.add-row td{
padding:4px 2px !important;
border-bottom:none !important;
background:transparent !important;
}
button.addEntry{
background:transparent;
color:#555;
border:1px dashed #555;
border-radius:5px;
padding:1px 6px;
font-size:14px;
cursor:pointer;
line-height:1.4;
transition:all 0.15s;
font-family:var(–sans);
}
button.addEntry:active{
border-color:#00e5a0;
color:#00e5a0;
}

/* ── Clock button ── */
.bottom-buttons{
padding:12px 14px 16px;
border-top:1px solid #444;
}
button.clock{
background:#00e5a0;
color:#000;
font-size:15px;
font-family:var(–sans);
font-weight:700;
letter-spacing:0.02em;
border-radius:12px;
width:100%;
padding:14px;
border:none;
cursor:pointer;
transition:opacity 0.15s, transform 0.1s;
}
button.clock:active{ opacity:0.85; transform:scale(0.99); }
</style>

</head>
<body>

<div class="app-frame">

  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-title">Timecard</div>
      <div id="weekLabel">Week of --/--/----</div>
      <div class="nav-row">
        <button class="nav-btn" onclick="changeWeek(-1)">← Prev</button>
        <button class="nav-btn" onclick="changeWeek(1)">Next →</button>
        <button class="sat-btn" id="satBtn" onclick="toggleSat()">Sat</button>
      </div>
    </div>
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  </div>

  <div id="diagBar" style="background:#1f1f1f;border-bottom:1px solid #333;padding:5px 18px;font-size:10px;font-family:monospace;color:#666;display:flex;flex-direction:column;gap:2px;">
    <div style="display:flex;justify-content:space-between;">
      <span id="diagSaved">Last saved: —</span>
      <span id="diagEntries">Entries: —</span>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span id="diagKey" style="color:#555;">Key: —</span>
      <span id="diagOrigin" style="color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;"></span>
    </div>
  </div>

  <div class="container">
    <div class="slide-wrapper">
      <table id="table" class="sat-hidden">
        <thead>
          <tr>
            <th></th>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th class="sat-col">Sat</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
        <tfoot>
          <tr class="add-row">
            <td></td>
            <td><button class="addEntry" onclick="addEntry(0)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(1)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(2)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(3)">+</button></td>
            <td><button class="addEntry" onclick="addEntry(4)">+</button></td>
            <td class="sat-col"><button class="addEntry" onclick="addEntry(5)">+</button></td>
          </tr>
          <tr>
            <td></td>
            <td class="total" id="t0"></td>
            <td class="total" id="t1"></td>
            <td class="total" id="t2"></td>
            <td class="total" id="t3"></td>
            <td class="total" id="t4"></td>
            <td class="total sat-col" id="t5"></td>
          </tr>
          <tr class="weekTotalRow">
            <td colspan="4" class="week-total-label">Week Total</td>
            <td colspan="2" class="weekTotal" id="weekTotal"></td>
            <td class="sat-col"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <div class="bottom-buttons">
    <button class="clock" onclick="clockAuto()">Clock In / Out</button>
  </div>

</div>

<script>
const days=6;
let weekOffset=0, initialRows=6;
let dynamicCounts={};

function getDynamicCounts(){
  const key=weekKey();
  if(!dynamicCounts[key]) dynamicCounts[key]=Array(days).fill(0);
  return dynamicCounts[key];
}

function makeInput(r,d){
  const input=document.createElement("input");
  input.type="tel"; input.inputMode="numeric"; input.pattern="[0-9]*";
  input.enterKeyHint="next";
  input.dataset.r=r; input.dataset.d=d;
  input.addEventListener("focus",()=>{ setTimeout(()=>input.select(),0); });
  input.addEventListener("change",()=>{save();calc();});
  input.addEventListener("blur",()=>{autoFormat(input);});
  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"||e.keyCode===13){ e.preventDefault(); moveDown(input); }
  });
  return input;
}

function moveDown(input){
  const col=input.dataset.d;
  const all=Array.from(document.querySelectorAll(`input[data-d="${col}"]`));
  const idx=all.indexOf(input);
  if(idx>=0&&idx<all.length-1) all[idx+1].focus();
  else input.blur();
}

function buildTable(){
  const body=document.getElementById("body");
  body.innerHTML="";
  for(let r=0;r<initialRows;r++){
    let tr=document.createElement("tr");
    let label=document.createElement("td"); label.innerText=r%2==0?"In":"Out"; tr.appendChild(label);
    for(let d=0;d<days;d++){
      let td=document.createElement("td");
      if(d===5) td.classList.add('sat-col');
      td.appendChild(makeInput(r,d));
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

function createDynamicPair(day,suppressSave){
  const tbody=document.getElementById("body");
  const inRow=document.createElement("tr");
  const outRow=document.createElement("tr");
  inRow.dataset.dynamic=day; outRow.dataset.dynamic=day;
  const inLabel=document.createElement("td"); inLabel.innerText="In"; inRow.appendChild(inLabel);
  const outLabel=document.createElement("td"); outLabel.innerText="Out"; outRow.appendChild(outLabel);
  for(let d=0;d<days;d++){
    let inCell=document.createElement("td");
    let outCell=document.createElement("td");
    if(d===5){ inCell.classList.add('sat-col'); outCell.classList.add('sat-col'); }
    if(d===day){
      inCell.appendChild(makeInput("dyn",d));
      outCell.appendChild(makeInput("dyn",d));
    }
    inRow.appendChild(inCell); outRow.appendChild(outCell);
  }
  tbody.appendChild(inRow); tbody.appendChild(outRow);
  if(!suppressSave){ getDynamicCounts()[day]++; save(); }
}

function addEntry(day){ createDynamicPair(day,false); }

function autoFormat(input){
  let prev=null;
  const colInputs=Array.from(document.querySelectorAll(`input[data-d="${input.dataset.d}"]`));
  for(let i=0;i<colInputs.length;i++){
    if(colInputs[i]===input) break;
    let t=parseTimeWithContext(colInputs[i].value,prev);
    if(t!=null) prev=t;
  }
  let t=parseTimeWithContext(input.value,prev);
  if(t!=null) input.value=formatTime(t);
  calc();
}

function parseTimeWithContext(v,prev=null){
  if(!v) return null;
  v=v.toLowerCase().replace(/\s/g,'');
  let h,m;
  if(/^\d{3,4}$/.test(v)){ h=v.slice(0,-2); m=v.slice(-2); }
  else{
    let m1=v.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/);
    if(!m1) return null;
    h=parseInt(m1[1]); m=parseInt(m1[2]||0);
    if(m1[3]=="pm"&&h!=12) h+=12;
    if(m1[3]=="am"&&h==12) h=0;
  }
  h=parseInt(h); m=parseInt(m);
  let minutes=h*60+m;
  if(prev!=null&&minutes<=prev) minutes+=12*60;
  return roundMinutes(minutes);
}

function formatTime(minutes){
  minutes=minutes%(24*60);
  let h=Math.floor(minutes/60),m=minutes%60;
  let ampm=h>=12?'p':'a';
  h=h%12; if(h===0) h=12;
  return `${h}:${m<10?"0":""}${m}${ampm}`;
}

function roundMinutes(minutes){ return Math.round(minutes/15)*15; }

function calc(){
  let week=0;
  for(let d=0;d<days;d++){
    let total=0,prev=null;
    const inputs=document.querySelectorAll(`input[data-d="${d}"]`);
    for(let i=0;i<inputs.length;i+=2){
      const t1=parseTimeWithContext(inputs[i]?.value,prev); if(t1!=null) prev=t1;
      const t2=parseTimeWithContext(inputs[i+1]?.value,t1); if(t2!=null) prev=t2;
      if(t1!=null&&t2!=null) total+=t2-t1;
    }
    let hrs=total/60; week+=hrs;
    document.getElementById("t"+d).innerHTML=hrs>0
      ? hrs.toFixed(2)+"<div class='bar' style='width:"+Math.min(hrs/12*100,100)+"%'></div>"
      : "";
  }
  const wEl=document.getElementById("weekTotal");
  wEl.innerText=week>0?week.toFixed(2)+"h":"—";
  wEl.className="weekTotal"+(week>40?" over":"");
}

function clockAuto(){
  let day=(new Date().getDay()+6)%7; if(day>5) return;
  const inputs=document.querySelectorAll(`input[data-d="${day}"]`);
  for(let i=0;i<inputs.length;i++){
    if(!inputs[i].value){
      if(i===inputs.length-1){ addEntry(day); }
      const now=new Date(); let minutes=Math.round((now.getHours()*60+now.getMinutes())/15)*15;
      let h=Math.floor(minutes/60),m=minutes%60;
      const ampm=h>=12?'p':'a'; h=h%12; if(h===0) h=12;
      inputs[i].value=`${h}:${m<10?"0":""}${m}${ampm}`;
      break;
    }
  }
  save(); calc();
}

let satVisible=false;
function toggleSat(){
  satVisible=!satVisible;
  document.getElementById('table').classList.toggle('sat-hidden',!satVisible);
  document.getElementById('satBtn').classList.toggle('active',satVisible);
  try{ localStorage.setItem('tc_sat',satVisible?'1':'0'); }catch(e){}
}

function changeWeek(dir){ weekOffset+=dir; load(); }

function weekKey(){
  let d=new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7+weekOffset*7);
  // Use local date components instead of toISOString() which uses UTC
  const y=d.getFullYear();
  const mo=String(d.getMonth()+1).padStart(2,'0');
  const dy=String(d.getDate()).padStart(2,'0');
  return "week_"+y+"-"+mo+"-"+dy;
}

function updateDiag(entryCount){
  try{
    const now=new Date();
    const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    const pad=n=>String(n).padStart(2,'0');
    document.getElementById('diagSaved').textContent=`Saved: ${pad(h)}:${pad(m)}:${pad(s)}`;
    document.getElementById('diagEntries').textContent=`Entries: ${entryCount}`;
    document.getElementById('diagKey').textContent=`Key: ${weekKey()}`;
    document.getElementById('diagOrigin').textContent=window.location.origin+window.location.pathname;
  }catch(e){}
}

function getAllData(){
  try{ const r=localStorage.getItem('tc_alldata'); if(r) return JSON.parse(r); }catch(e){}
  return {};
}
function setAllData(d){
  try{ localStorage.setItem('tc_alldata',JSON.stringify(d)); }catch(e){}
}
function save(){
  const allData=getAllData();
  const key=weekKey();
  allData[key+'_structure']=getDynamicCounts();
  const data=[];
  document.querySelectorAll("input").forEach(i=>data.push(i.value));
  allData[key]=data;
  setAllData(allData);
  updateDiag(data.filter(v=>v).length);
}

function load(){
  buildTable();
  const allData=getAllData();
  const key=weekKey();
  const savedCounts=allData[key+'_structure']||null;
  if(savedCounts){
    dynamicCounts[key]=savedCounts;
    for(let d=0;d<days;d++)
      for(let i=0;i<savedCounts[d];i++)
        createDynamicPair(d,true);
  } else {
    dynamicCounts[key]=Array(days).fill(0);
  }
  const saved=allData[key]||[];
  const inputs=document.querySelectorAll("input");
  inputs.forEach((inp,idx)=>{ if(saved[idx]!==undefined) inp.value=saved[idx]; });
  updateWeekLabel();
  calc();
  // Show load diagnostics
  try{
    const now=new Date();
    const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    const pad=n=>String(n).padStart(2,'0');
    const entryCount=saved.filter(v=>v).length;
    document.getElementById('diagSaved').textContent=entryCount>0?`Loaded: ${pad(h)}:${pad(m)}:${pad(s)}`:`No data found`;
    document.getElementById('diagSaved').style.color=entryCount>0?'#00e5a0':'#ff4d4d';
    document.getElementById('diagEntries').textContent=`Entries: ${entryCount}`;
    document.getElementById('diagKey').textContent=`Key: ${key}`;
    document.getElementById('diagOrigin').textContent=window.location.origin+window.location.pathname;
  }catch(e){}
  // Restore sat visibility
  try{
    const sv=localStorage.getItem('tc_sat');
    satVisible = sv==='1';
  }catch(e){ satVisible=false; }
  document.getElementById('table').classList.toggle('sat-hidden',!satVisible);
  document.getElementById('satBtn').classList.toggle('active',satVisible);
}

function updateWeekLabel(){
  let d=new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7+weekOffset*7);
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("weekLabel").innerText=`${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function exportCSV(){
  const rows=[];
  document.querySelectorAll("#body tr").forEach(tr=>{
    const row=[];
    tr.querySelectorAll("td").forEach(td=>{
      const input=td.querySelector("input");
      row.push(input?input.value:td.innerText);
    });
    rows.push(row.join(","));
  });
  const totalRow=["Total"];
  for(let d=0;d<6;d++) totalRow.push(document.getElementById("t"+d).innerText.replace(/\n.*/,""));
  rows.push(totalRow.join(","));
  let d=new Date();
  d.setDate(d.getDate()-(d.getDay()+6)%7+weekOffset*7);
  const ey=d.getFullYear();
  const emo=String(d.getMonth()+1).padStart(2,'0');
  const edy=String(d.getDate()).padStart(2,'0');
  const blob=new Blob([rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`timecard_${ey}-${emo}-${edy}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); },100);
}

let startX=null;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX,{passive:true});
document.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-startX;
  if(dx>80){ weekOffset--; load(); }
  if(dx<-80){ weekOffset++; load(); }
});

load();
</script>
